{% extends "base.html" %}

{% block content %}
<div class="flex-1 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="text-center text-3xl font-extrabold text-white">
            {{ crate::i18n::t("login_title", lang) }}
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-slate-800 py-8 px-4 shadow-xl sm:rounded-xl sm:px-10 border border-slate-700">
            <form class="space-y-6" action="/login" method="POST">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1">
                        {{ crate::i18n::t("username", lang) }}
                    </label>
                    <input id="username" name="username" type="text" required class="appearance-none block w-full px-4 py-2.5 border border-slate-600 rounded-lg shadow-sm bg-slate-900/50 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all duration-200">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1">
                        {{ crate::i18n::t("password", lang) }}
                    </label>
                    <input id="password" name="password" type="password" required class="appearance-none block w-full px-4 py-2.5 border border-slate-600 rounded-lg shadow-sm bg-slate-900/50 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all duration-200">
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-slate-800 transition-all active:scale-[0.98]">
                        {{ crate::i18n::t("login_btn", lang) }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
