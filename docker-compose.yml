services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rust_ci
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=sqlite://data/app.db
      - RUST_LOG=debug
      - PORT=3000
    volumes:
      - ./data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.30.0
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_conf:/etc/nginx/conf.d/
    depends_on:
      - app
    restart: unless-stopped